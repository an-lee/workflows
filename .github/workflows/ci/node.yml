name: Node.js CI

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        type: string
        default: '20'
      cache-dependency-path:
        description: 'Path to dependency files for caching'
        type: string
        default: 'package-lock.json'
      run-tests:
        description: 'Command to run tests'
        type: string
        default: 'npm test'
    secrets:
      npm-token:
        description: 'npm token for publishing (optional)'
        required: false

jobs:
  test:
    name: Node.js ${{ inputs.node-version }} test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@b39f49f6d3f0ee5d0e2a0d2e3c4f5a6b7c8d9e0f
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.cache-dependency-path }}
      - name: Install dependencies
        run: npm ci
        if: hashFiles('package.json') != ''
      - name: Run tests
        run: ${{ inputs.run-tests }}
        if: hashFiles('package.json') != ''
